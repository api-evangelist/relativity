aid: relativity
name: Relativity
description: Relativity is an eDiscovery and legal review platform offering RelativityOne,
  a cloud-based SaaS solution for managing the full legal data lifecycle. Its REST
  API enables programmatic access to workspaces, document import and export, processing
  pipelines, search and analytics, production management, legal hold, automated workflows,
  user and permission management, and AI-powered review features. Relativity exposes
  80+ integration APIs organized by business domain, supporting OAuth2, basic, and
  cookie-based authentication.
