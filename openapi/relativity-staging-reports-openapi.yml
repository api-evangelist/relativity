openapi: 3.0.1
info:
  title: Staging Reports API
  version: v4
servers:
- url: https://{host}/Relativity.REST/api/staging-insights
  variables:
    host:
      default: host
      description: Your RelativityOne tenant name
paths:
  /v4/billable-summary-reports/file:
    get:
      tags:
      - BillableSummaryReports
      summary: Get a billable summary report file
      description: This endpoint retrieves a billable summary report file based on
        the container name and report date. Returns 403 if the caller does not have
        access to the requested container.
      parameters:
      - name: Container
        in: query
        required: true
        schema:
          type: string
      - name: Date
        in: query
        required: true
        schema:
          pattern: ^\d{8}$
          type: string
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
            text/json:
              schema:
                type: string
                format: binary
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
  /v4/billable-summary-reports:
    get:
      tags:
      - BillableSummaryReports
      summary: Get billable summary reports list
      description: This endpoint retrieves a paginated list of all available billable
        summary reports.
      parameters:
      - name: start
        in: query
        schema:
          type: integer
          format: int32
      - name: limit
        in: query
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/BillableSummaryReportPageResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/BillableSummaryReportPageResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/BillableSummaryReportPageResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
  /v4/billable-summary-reports/latest:
    get:
      tags:
      - BillableSummaryReports
      summary: Get latest billable summary report per container
      description: Returns the most recent billable summary report for each unique
        container the caller has access to.
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/BillableSummaryReportListResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/BillableSummaryReportListResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/BillableSummaryReportListResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
  /v4/billable-summary-reports/directory-details:
    post:
      tags:
      - BillableSummaryReports
      summary: Get billable summary report directory details
      description: Retrieves details for a specific directory inside a billable summary
        report based on the container, report date, and path. Send the request body
        as JSON with container, date, and path properties. Returns 403 if the caller
        does not have access to the requested container.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillableSummaryReportDirectoryDetailsRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/BillableSummaryReportDirectoryDetailsRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/BillableSummaryReportDirectoryDetailsRequest'
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/BillableSummaryReportDirectoryDetailsResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/BillableSummaryReportDirectoryDetailsResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/BillableSummaryReportDirectoryDetailsResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '429':
          description: Too Many Requests
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
  /v4/Directory/containers:
    get:
      tags:
      - Directory
      summary: Get available containers
      description: This endpoint retrieves a list of all available containers.
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
  /v4/Directory/directories:
    post:
      tags:
      - Directory
      summary: Get directory listing
      description: This endpoint retrieves a paginated list of directories based on
        the specified path and paging parameters.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectoryListRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/DirectoryListRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/DirectoryListRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
  /v4/Reports:
    post:
      tags:
      - Reports
      summary: Create new report
      description: Schedules a new report generation. When 'date' (YYYYMMDD) is provided
        in the body, a Summary report is produced from the Billable Summary CSV; otherwise
        a Detailed folder report is generated.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectoryReportRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/DirectoryReportRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/DirectoryReportRequest'
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ReportResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '429':
          description: Too Many Requests
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
    get:
      tags:
      - Reports
      summary: Get reports list
      description: This endpoint retrieves a paginated list of reports. Snapshot reports
        ("Last Known Sizes") are included by default and can be excluded by passing
        includeSnapshotReports=false. Summary reports are excluded by default and
        are only returned when includeSummaryReports=true.
      parameters:
      - name: start
        in: query
        schema:
          type: integer
          format: int32
      - name: limit
        in: query
        schema:
          type: integer
          format: int32
      - name: includeSnapshotReports
        in: query
        schema:
          type: boolean
          default: true
      - name: includeSummaryReports
        in: query
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ReportJobsResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/ReportJobsResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/ReportJobsResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
  /v4/Reports/{id}:
    get:
      tags:
      - Reports
      summary: Get report details
      description: This endpoint retrieves detailed information about a specific report
        including its status and metadata.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ReportJobResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/ReportJobResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/ReportJobResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
    delete:
      tags:
      - Reports
      summary: Cancel report
      description: This endpoint cancels a running or pending report generation job.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
  /v4/Reports/{id}/file:
    get:
      tags:
      - Reports
      summary: Download report file
      description: This endpoint downloads the generated report file for a completed
        report.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
            text/json:
              schema:
                type: string
                format: binary
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
components:
  schemas:
    DirectoryListRequest:
      required:
      - path
      type: object
      properties:
        path:
          minLength: 1
          type: string
        paging:
          $ref: '#/components/schemas/Page'
      additionalProperties: false
    DirectoryReportRequest:
      required:
      - depth
      - path
      type: object
      properties:
        path:
          minLength: 1
          type: string
        includeFiles:
          type: boolean
        depth:
          $ref: '#/components/schemas/ReportDepth'
        useSnapshot:
          type: boolean
        date:
          pattern: ^\d{8}$
          type: string
          nullable: true
          description: Optional. When provided in YYYYMMDD format, a Summary report
            is produced from the Billable Summary CSV for the container/date combination
            instead of scanning storage.
      additionalProperties: false
    BillableSummaryReportDirectoryDetailsRequest:
      required:
      - container
      - date
      - path
      type: object
      properties:
        container:
          type: string
          minLength: 1
        date:
          type: string
          pattern: ^\d{8}$
        path:
          type: string
          description: Path within the container. Use an empty string ("") to target
            the container root. A value of "/" is normalized to the empty string and
            is therefore also treated as the container root.
      additionalProperties: false
    BillableSummaryReportDirectoryDetailsResponse:
      type: object
      properties:
        name:
          type: string
          nullable: true
        level:
          type: integer
          format: int32
        sizeBytes:
          type: integer
          format: int64
        files:
          type: integer
          format: int32
        createdDateUtc:
          type: string
          format: date-time
          nullable: true
        lastModifiedDateUtc:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false
    BillableSummaryReportListResponse:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: '#/components/schemas/BillableSummaryReport'
          nullable: true
      additionalProperties: false
    ReportDepth:
      enum:
      - TopLevelOnly
      - OneLevelDeep
      - TwoLevelsDeep
      - FullHierarchy
      type: string
    BillableSummaryReport:
      type: object
      properties:
        container:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
      additionalProperties: false
    BillableSummaryReportPageResponse:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: '#/components/schemas/BillableSummaryReport'
          nullable: true
        totalCount:
          type: integer
          format: int32
      additionalProperties: false
    ReportCategory:
      enum:
      - DetailedReport
      - SummaryReport
      type: string
    ReportJobResponse:
      type: object
      properties:
        reportId:
          type: string
          format: uuid
        path:
          type: string
          nullable: true
        createdOn:
          type: string
          format: date-time
        state:
          type: string
          nullable: true
        includeFiles:
          type: boolean
        depth:
          $ref: '#/components/schemas/ReportDepth'
        useSnapshot:
          type: boolean
        captureStart:
          type: string
          format: date-time
        captureEnd:
          type: string
          format: date-time
        reportCategory:
          $ref: '#/components/schemas/ReportCategory'
        reportDate:
          type: string
          nullable: true
          description: For Summary reports, the source CSV date (YYYYMMDD); otherwise
            null.
        errorMessage:
          type: string
          nullable: true
          description: Sanitized, user-facing failure reason. Populated only when
            `state` is `Failed` (see Failure reporting in the implementation notes);
            null otherwise. Omitted from the JSON payload when null.
      additionalProperties: false
    ReportJobsResponse:
      type: object
      properties:
        reportJobs:
          type: array
          items:
            $ref: '#/components/schemas/ReportJobResponse'
          nullable: true
        paging:
          $ref: '#/components/schemas/Page'
      additionalProperties: false
    ReportResponse:
      type: object
      properties:
        reportId:
          type: string
          format: uuid
      additionalProperties: false
    Page:
      required:
      - limit
      - start
      type: object
      properties:
        start:
          maximum: 2147483647
          minimum: 1
          type: integer
          format: int32
        limit:
          maximum: 2147483647
          minimum: 1
          type: integer
          format: int32
      additionalProperties: false
    Microsoft.AspNetCore.Mvc.ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
      additionalProperties: {}
  securitySchemes:
    Bearer:
      type: http
      description: 'Standard Authorization header using the Bearer scheme. Example:
        "bearer {token}"'
      scheme: bearer
      bearerFormat: JWT
security:
- Bearer: []
