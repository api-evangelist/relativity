                summary: Product configurations for an instance for a given dates
                value:
                  instanceID: f53c069b-9706-4570-8f97-be6e8fdbe156
                  dateKeys:
                  - '202308'
                  - '202307'
                  metricKey: Relativity_Translate
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/GetProductConfigurationResponse'
              example:
                results:
                  Relativity_Translate:
                  - name: ConversionRate
                    dateKey: '202308'
                    value: 20
                  - name: ConversionRate
                    dateKey: '202307'
                    value: 30
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductConfigurationResponse'
              example:
                results:
                  Relativity_Translate:
                  - name: ConversionRate
                    dateKey: '202308'
                    value: 20
