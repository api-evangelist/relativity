openapi: 3.0.1
info:
  title: Analytics.Conceptual.Service.Interfaces.Public.V1 AnnotationService CollectAPI API
  description: Analytics.Conceptual.Service.Interfaces.Public
  version: V1
servers:
- url: /Relativity.REST/api
  description: The URL prefix for all Kepler services
tags:
- name: CollectAPI
paths:
  /collect-services/v1/CollectAPI/{workspaceId}/collection:
    put:
      tags:
      - CollectAPI
      parameters:
      - name: workspaceArtifactId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: x-csrf-header
        in: header
        description: Instance Header
        required: true
        schema:
          type: string
          default: '-'
      requestBody:
        content:
          application/json-patch+json:
            schema:
              $ref: '#/components/schemas/CreateCollectionAPIModel'
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionAPIModel'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionAPIModel'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateCollectionAPIModel'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/StringListActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/StringListActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/StringListActionResult'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
        '500':
          description: Internal Server Error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
  /collect-services/v1/CollectAPI/{workspaceId}/collection/{collectionArtifactId}/start-target-generation:
    post:
      tags:
      - CollectAPI
      parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: x-csrf-header
        in: header
        description: Instance Header
        required: true
        schema:
          type: string
          default: '-'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/StringListActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/StringListActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/StringListActionResult'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
        '500':
          description: Internal Server Error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
  /collect-services/v1/CollectAPI/{workspaceArtifactId}/collection/{collectionArtifactId}/target-generation:
    get:
      tags:
      - CollectAPI
      parameters:
      - name: workspaceArtifactId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: collectionArtifactId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/StringListActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/StringListActionResult'
            text/json:
              schema:
