        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
        '500':
          description: Internal Server Error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
  /collect-services/v1/CollectAPI/{workspaceArtifactId}/collection/{collectionArtifactId}/start-collection:
    patch:
      tags:
      - CollectAPI
      parameters:
      - name: workspaceArtifactId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: collectionArtifactId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: x-csrf-header
        in: header
        description: Instance Header
        required: true
        schema:
          type: string
          default: '-'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/StartJobResultActionResult'
            application/json:
              schema:
                $ref: '#/components/schemas/StartJobResultActionResult'
            text/json:
              schema:
                $ref: '#/components/schemas/StartJobResultActionResult'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ActionResult'
            application/json:
