components:
  schemas:
    IArmRestoreJobManager_V3_CreateAsync_RequestBody:
      title: IArmRestoreJobManager_V3_CreateAsync_RequestBody
      type: object
      properties:
        request:
          $ref: '#/components/schemas/RestoreJobRequest_V3'
    RestoreJobRequest_V3:
      title: RestoreJobRequest_V3
      type: object
      properties:
        ArchivePath:
          type: string
        JobPriority:
          enum:
          - Low
          - Medium
          - High
          type: string
        ScheduledStartTime:
          type: string
          format: date-time
          nullable: true
        ExistingTargetDatabase:
          type: string
        DestinationOptions:
          $ref: '#/components/schemas/RestoreDestinationOptions_V3'
        MigratorOptions:
          $ref: '#/components/schemas/MigratorOptions_V3'
        NotificationOptions:
          $ref: '#/components/schemas/NotificationOptions_V3'
        UiJobActionsLocked:
          type: boolean
    RestoreDestinationOptions_V3:
      title: RestoreDestinationOptions_V3
      type: object
      properties:
        MatterID:
          type: integer
    MigratorOptions_V3:
      title: MigratorOptions_V3
      type: object
      additionalProperties:
        type: object
      example: '"Common": {"FileFirstFlow": {"IsFilesFirstFlow": true, "AdditionalFilesDirectoryPath":
        "path"}},"UserGroup": {"GroupMapping": {"AutoMapGroups": false,"GroupMappings":
        [{"ArchiveGroupID": 1000000,"InstanceGroupID": 1000000}]},"UserMapping": {"AutoMapUsers":
        true,"UserMappings": [{"ArchiveUserID": 7000000,"InstanceUserID": 1000000}]}'
    NotificationOptions_V3:
      title: NotificationOptions_V3
      type: object
      properties:
        NotifyJobCreator:
          type: boolean
        NotifyJobExecutor:
          type: boolean
    CreateRestoreJobResponse_V3:
      title: CreateRestoreJobResponse_V3
      type: object
      properties:
        JobID:
          type: string
    RestoreJobResponse_V3:
      title: RestoreJobResponse_V3
      type: object
      properties:
        JobID:
          type: string
        JobName:
          type: string
        ArchivePath:
          type: string
        ScheduledStartTime:
          type: string
